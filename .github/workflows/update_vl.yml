name: Mise à jour quotidienne des VL Boursorama

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 6'
  workflow_dispatch:

jobs:
  update-vl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scraping des VL sur Boursorama
        run: python scraper.py
        continue-on-error: true

      - name: Verification du fichier genere
        run: |
          if [ -f vl_overrides.json ]; then
            echo "OK vl_overrides.json genere"
            python -c "import json; d=json.load(open('vl_overrides.json')); print(f'{len(d)} fonds scrapes')"
          else
            echo "WARN vl_overrides.json absent"
          fi

      - name: Regeneration de index.html
        run: python gen_app_v2.py

      - name: Commit et push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Aucun changement detecte - pas de commit"
          else
            DATE=$(date '+%d/%m/%Y %H:%M')
            git commit -m "Mise a jour VL Boursorama - ${DATE}"
            git push
            echo "Deploye sur GitHub Pages"
          fi
