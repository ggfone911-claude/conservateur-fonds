name: Mise à jour quotidienne des VL Boursorama

on:
  schedule:
    # Tous les jours à 8h00 heure de Paris (UTC+2 en été = 06:00 UTC)
    - cron: '0 6 * * 1-5'   # Lundi–vendredi (marchés ouverts)
    - cron: '0 7 * * 6'     # Samedi — mise à jour hebdo en bonus
  workflow_dispatch:         # Déclenchement manuel possible depuis GitHub

jobs:
  update-vl:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Nécessaire pour git push

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scraping des VL sur Boursorama
        run: |
          python scraper.py
        # Boursorama peut bloquer ponctuellement — on continue même si partiel
        continue-on-error: true

      - name: Vérification du fichier généré
        run: |
          if [ -f vl_overrides.json ]; then
            echo "✅ vl_overrides.json généré"
            python -c "import json; d=json.load(open('vl_overrides.json')); print(f'{len(d)} fonds scrapés')"
          else
            echo "⚠️ vl_overrides.json absent — on utilise les données PDF"
          fi

      - name: Régénération de index.html
        run: |
          python gen_app_v2.py

      - name: Commit et push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html vl_overrides.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucun changement détecté — pas de commit"
          else
            DATE=$(date '+%d/%m/%Y %H:%M')
            git commit -m "📈 Mise à jour VL Boursorama — ${DATE}"
            git push
            echo "✅ Déployé sur GitHub Pages"
          fi
